/home/dps8m-proxy/log/console.log {
  sharedscripts
  daily
  maxsize 256M
  rotate 365
  missingok
  compress
  delaycompress
  notifempty

  # Switch user:group context to dps8m-proxy user and group
  su dps8m-proxy dps8m-proxy
  create 0600 dps8m-proxy dps8m-proxy

  # Check for systemd service first, then fallback to killall
  postrotate
    if systemctl is-active --quiet dps8m-proxy.service 2> /dev/null; then
      systemctl reload dps8m-proxy.service
    else
      killall -HUP dps8m-proxy 2> /dev/null || true
    fi
  endscript
}

